<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/png" href="favicon-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d10" />
    <title>Powerbatics</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app"></main>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="app.js" type="module"></script>
    <script data-goatcounter="https://powerbatics.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script>
      // SPA tracking: log each view change so GoatCounter shows which
      // pages people actually use (home, day 1, exercise 3, etc.)
      window.addEventListener("hashchange", () => {
        if (window.goatcounter?.count)
          window.goatcounter.count({ path: location.hash || "/" });
      });
      // Track PWA installs as a custom event
      window.addEventListener("appinstalled", () => {
        if (window.goatcounter?.count)
          window.goatcounter.count({ path: "install", title: "PWA Installed", event: true });
      });
    </script>
  </body>
</html>
