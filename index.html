<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/png" href="favicon-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d10" />
    <title>Powerbatics</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app"></main>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="app.js" type="module"></script>
    <script data-goatcounter="https://powerbatics.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script>
      // SPA tracking: only log meaningful navigations so page-view counts
      // stay close to real "someone looked at this" numbers.
      var _lastPath = null;
      function gcTrack() {
        var h = location.hash.replace(/^#\/?/, "") || "home";
        // Normalize to top-level view: home, day/1, day/1/ex/3, settings, past
        var path = "/" + h.split("/").slice(0, 4).join("/");
        if (path === _lastPath) return;
        _lastPath = path;
        if (window.goatcounter?.count) window.goatcounter.count({ path: path });
      }
      window.addEventListener("hashchange", gcTrack);

      // Track PWA installs
      window.addEventListener("appinstalled", function() {
        if (window.goatcounter?.count)
          window.goatcounter.count({ path: "install", title: "PWA Installed", event: true });
      });
    </script>
  </body>
</html>
